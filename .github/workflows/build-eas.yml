name: Build via EAS (Android + iOS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

# Requires repository secret EXPO_TOKEN (https://expo.dev/accounts/[account]/settings/access-tokens)
# iOS production builds also need an Apple Developer account configured via `eas credentials`.

jobs:
  build:
    name: EAS build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install workspace dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build shared package
        run: npm run shared:build

      - name: Trigger EAS Build (non-interactive, wait until done)
        working-directory: apps/mobile
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive --no-wait
